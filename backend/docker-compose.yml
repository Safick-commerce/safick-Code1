# =============================================================================
# wispaCart Local Development Services
# =============================================================================
# Starts PostgreSQL and Redis for local development.
#
# Usage:
#   docker-compose up -d     → Start services in the background
#   docker-compose down      → Stop services
#   docker-compose logs -f   → View live logs
#
# After starting, the database will be available at:
#   Host: localhost
#   Port: 5432
#   Database: wispacart
#   User: wispacart
#   Password: dev_password
#
# Redis will be available at:
#   redis://localhost:6379
# =============================================================================

services:
  # PostgreSQL — primary database for all structured data
  # (users, products, conversations, messages, orders, etc.)
  postgres:
    image: postgres:16-alpine
    container_name: wispacart-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: wispacart
      POSTGRES_USER: wispacart
      POSTGRES_PASSWORD: dev_password
    volumes:
      - pgdata:/var/lib/postgresql/data

  # Redis — used for caching, rate limiting, and Socket.IO adapter (future)
  redis:
    image: redis:7-alpine
    container_name: wispacart-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  pgdata:
